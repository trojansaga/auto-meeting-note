watch_dir: "~/Desktop"
stt_backend: "whisper"
whisper_model: "small"
whisper_quant: "4bit"
whisper_batch_size: 4
qwen_model: "Qwen/Qwen3-ASR-0.6B"
apple_speech_model: "speech_transcriber"
qwen_dtype: null
qwen_device_map: null
qwen_attn_implementation: null
qwen_forced_aligner: null
qwen_return_timestamps: false
qwen_max_new_tokens: 4096
qwen_max_batch_size: 1
qwen_chunk_seconds: 600
language: "ko"
openai_model: "gpt-5.4"
export_dir: "~/Downloads"
mic_enabled: false       # 마이크 동시 녹음 여부 (시스템 오디오와 믹싱됨)
mic_device_index: "builtin"   # "builtin"이면 맥북 내장 마이크를 우선 사용
                              # 이름/인덱스를 직접 넣을 수도 있음
                              # 장치 목록 확인: ffmpeg -f avfoundation -list_devices true -i ""
